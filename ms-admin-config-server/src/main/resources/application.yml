spring:
  application:
    name: ms-admin-config-server
  profiles:
    # Perfil NATIVE: la configuracion se lee de archivos locales (sin Git)
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configurations

# Puerto estandar del Config Server
server:
  port: 8888

# El Config Server tambien se registra en Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
