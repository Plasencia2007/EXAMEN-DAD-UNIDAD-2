# ============================================================
# Perfil PROD de ms-gestion-alumno
# MySQL con credenciales por VARIABLES DE ENTORNO,
# show-sql=false, ddl-auto=validate.
#   DB_URL / DB_USER / DB_PASSWORD
# ============================================================
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
