# ============================================================
# Perfil DEV de ms-gestion-taller
# MySQL local (puerto 3307), show-sql=true, ddl-auto=update.
# (equivale a la configuracion historica del servicio)
# Se fusiona SOBRE ms-gestion-taller.yml (base comun) +
# application.yml (Eureka + JWT compartidos).
# ============================================================
spring:
  datasource:
    url: "jdbc:mysql://localhost:3307/db_taller?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false"
    username: root
    password: mysql123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
