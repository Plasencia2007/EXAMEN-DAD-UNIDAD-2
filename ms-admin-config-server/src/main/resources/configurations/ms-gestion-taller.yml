# ============================================================
# Configuracion del microservicio COMPUESTO de TALLERES
# ============================================================
server:
  port: 8083

spring:
  datasource:
    url: "jdbc:mysql://localhost:3307/db_taller?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false"
    username: root
    password: mysql123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  cloud:
    openfeign:
      client:
        config:
          # Tiempos de espera (ms) para las llamadas Feign = patron Timeout
          default:
            connect-timeout: 3000
            read-timeout: 3000

# ============================================================
# RESILIENCIA (Resilience4j): Circuit Breaker + Retry
# Aplica a las llamadas Feign de ms-gestion-taller hacia
# instructor (instancia "instructor") y alumno (instancia "alumno").
# ============================================================
resilience4j:
  circuitbreaker:
    instances:
      instructor:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5          # minimo de llamadas antes de calcular la tasa de fallo
        failure-rate-threshold: 50          # abre el circuito si fallan >= 50%
        wait-duration-in-open-state: 10s    # tiempo abierto antes de pasar a half-open
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:                  # un 404 NO debe abrir el circuito (no es fallo del servicio)
          - feign.FeignException$NotFound
      alumno:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - feign.FeignException$NotFound
  retry:
    instances:
      instructor:
        max-attempts: 3                     # 1 intento + 2 reintentos
        wait-duration: 500ms
        retry-exceptions:                   # reintenta solo ante fallos transitorios / de red
          - feign.RetryableException
          - feign.FeignException$InternalServerError
          - feign.FeignException$ServiceUnavailable
        ignore-exceptions:
          - feign.FeignException$NotFound
      alumno:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - feign.RetryableException
          - feign.FeignException$InternalServerError
          - feign.FeignException$ServiceUnavailable
        ignore-exceptions:
          - feign.FeignException$NotFound

# Expone el estado de los circuit breakers para poder demostrarlo
management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,retries
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
