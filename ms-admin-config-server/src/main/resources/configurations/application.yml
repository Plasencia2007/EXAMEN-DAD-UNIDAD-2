# ============================================================
# Configuracion COMPARTIDA por todos los microservicios cliente
# ============================================================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh

# ============================================================
# Configuracion JWT COMPARTIDA por todos los servicios
# (ms-seguridad firma los tokens; instructor/alumno/taller los validan).
# El secreto debe ser el MISMO en todos.
# ============================================================
jwt:
  secret: "clave-secreta-jwt-academia-talleres-dad-unidad2-2026-super-segura-cambia-en-produccion"
  # Tiempo de vida del token en milisegundos (3600000 = 1 hora)
  expiration: 3600000
