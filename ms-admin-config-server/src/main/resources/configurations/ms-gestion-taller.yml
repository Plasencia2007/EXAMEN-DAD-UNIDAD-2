
server:
  port: 8083

spring:
  datasource:
    url: "jdbc:mysql://localhost:3307/db_taller?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false"
    username: root
    password: mysql123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 3000

resilience4j:
  circuitbreaker:
    instances:
      instructor:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5          
        failure-rate-threshold: 50          
        wait-duration-in-open-state: 10s   
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:                
          - feign.FeignException$NotFound
      alumno:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - feign.FeignException$NotFound
  retry:
    instances:
      instructor:
        max-attempts: 3                    
        wait-duration: 500ms
        retry-exceptions:                  
          - feign.RetryableException
          - feign.FeignException$InternalServerError
          - feign.FeignException$ServiceUnavailable
        ignore-exceptions:
          - feign.FeignException$NotFound
      alumno:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - feign.RetryableException
          - feign.FeignException$InternalServerError
          - feign.FeignException$ServiceUnavailable
        ignore-exceptions:
          - feign.FeignException$NotFound

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,retries
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
